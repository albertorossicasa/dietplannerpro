name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Crea gradle-wrapper.properties
        run: |
          mkdir -p android/gradle/wrapper
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
      - run: npm install
      - run: npx expo prebuild --platform android --clean
      - run: cd android && chmod +x gradlew && ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
